<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки SES</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
    }
    
    h3 {
      margin: 0 0 15px 0;
      color: #0066cc;
      font-size: 16px;
      text-align: center;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      font-size: 12px;
      color: #555;
    }
    
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    input[type="text"], select {
      flex: 1;
      padding: 7px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      box-sizing: border-box;
      font-family: 'Courier New', monospace;
    }
    
    button {
      padding: 7px 12px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    button:hover {
      opacity: 0.9;
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    #testBtn {
      background: #28a745;
      color: white;
    }
    
    #testBtn:hover {
      background: #218838;
    }
    
    #saveBtn {
      background: #007bff;
      color: white;
      width: 100%;
      padding: 10px;
      margin-top: 5px;
    }
    
    #saveBtn:hover {
      background: #0056b3;
    }
    
    #status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.5;
      display: none;
      background: #f8f9fa;
    }
    
    #status.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    #status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    #status.loading {
      display: block;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }
    
    .status-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }
    
    .hint {
      font-size: 10px;
      color: #999;
      margin-top: -8px;
      margin-bottom: 8px;
    }
    
    .info {
      margin-top: 12px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 4px;
      font-size: 10px;
      color: #666;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h3>⚙️ Настройки EBS</h3>
  
  <label for="serverUrl">🌐 Адрес сервера:</label>
  <div class="input-group">
    <input type="text" id="serverUrl" placeholder="http://127.0.0.1:49850">
    <button id="testBtn">🔍</button>
  </div>
  
  <label for="groupSelect">📁 Группа данных:</label>
  <select id="groupSelect">
    <option value="2g">II Группа</option>
    <option value="3g">III Группа</option>
  </select>
  
  <button id="saveBtn">💾 Сохранить</button>
  
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
